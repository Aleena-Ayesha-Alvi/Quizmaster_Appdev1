<!doctype html>
<html lang="en">
  <head>
    <title>Home Page</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <style>
      body {
        background-color: #f9f9f9;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .box {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      .header-text {
        font-weight: bold;
        font-size: 2rem;
        color: #333;
      }
      .subheading {
        color: #555;
        font-size: 1.2rem;
        margin-bottom: 20px;
      }
      .btn-black {
        background-color: black;
        color: white;
        padding: 12px 30px;
        font-size: 1.1rem;
        border-radius: 30px;
        text-transform: uppercase;
        transition: 0.3s;
        margin: 10px;
        text-decoration: none;
      }
        .btn-black:hover {
            background-color: #444;
            color: white;
        }
    </style>
  </head>
  <body>
    <div class="box">
      <h3 class="header-text">Welcome to Quiz Master Application</h3>
      <a href="/login" class="btn btn-black">Login</a>
      <a href="/register" class="btn btn-black">Sign Up</a>
    </div>
  </body>
</html>
