<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Master</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        body {
            background-color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .card {
            border-radius: 12px;
            overflow: hidden;
        }
        .card-header {
            background-color: black;
            color: white;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px;
        }
        .form-control {
            background-color: #f9f9f9;
            color: black;
            border: 1px solid #ccc;
        }
        .form-control::placeholder {
            color: #888;
        }
        .btn-black {
            background-color: black;
            color: white;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 30px;
            text-transform: uppercase;
            transition: 0.3s;
            border: none;
            width: 100%;
        }
        .btn-black:hover {
            background-color: #333;
        }
        .err_msg {
            color: red !important;
            text-align: center;
            margin-top: 10px;
        }
        a {
            color: #0d6efd;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="card">
            <div class="card-header">
                Login
            </div>
            <div class="card-body">
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="user_name" class="form-label">User Name (E-mail)</label>
                        <input type="email" class="form-control" name="user_name" id="user_name" placeholder="user@gmail.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" id="password" placeholder="password" required>
                    </div>
                    <div class="mb-3 d-grid">
                        <button type="submit" class="btn btn-black">Login</button>
                    </div>
                    <div class="mb-3 d-grid">
                        <a href="/" class="btn btn-black">Cancel</a>
                    </div>
                    <div class="text-center">
                        <p>New User? <a href="/register">Sign Up</a></p>
                        <div class="err_msg">{{ err_msg }}</div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
