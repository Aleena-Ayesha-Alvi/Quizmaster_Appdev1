<!doctype html>
<html lang="en">
<head>
  <title>Admin Page</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  
  <style>
      body {
          background-color: white;
          font-family: Arial, sans-serif;
      }

      .navbar {
          background-color: black !important;
      }

      .navbar .navbar-brand,
      .navbar .nav-link {
          color: white !important;
      }

      .navbar .nav-link:hover {
          text-decoration: underline;
      }

      .btn-outline-light {
          border-color: white;
          color: white;
      }

      .btn-outline-light:hover {
          background-color: white;
          color: black;
      }

      .container-box {
          background: white;
          padding: 40px;
          border-radius: 12px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
          width: 90%;
          max-width: 900px;
          margin: 30px auto;
      }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <span class="navbar-brand">Welcome Admin</span>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/admin_dashboard/{{name}}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/admin/summary">Summary</a></li>
          <li class="nav-item"><a class="nav-link" href="/quiz/{{name}}">Quiz</a></li>
          <li class="nav-item"><a class="nav-link" href="/login">Logout</a></li>
        </ul>
        <form class="d-flex" method="POST" action="/adminsearch/{{name}}">
          <input class="form-control me-2" type="text" placeholder="Search Here" name="search_txt" id="search_txt">
          <button class="btn btn-outline-light" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container-box">
    {% block content %}
    {% endblock %}
  </div>

</body>
</html>
